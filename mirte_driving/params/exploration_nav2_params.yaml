# ════════════════════════════════════════════════════════════════════════════
# exploration_nav2_params.yaml — the NAVIGATION brain's configuration.
#
# This single file configures the five Nav2 servers that shuttle.launch.py loads
# into one composed container.  It is the heart of the navigation half of
# mirte_driving_3; tune the robot's driving behaviour HERE (the shuttle_manager
# also overrides a couple of these live: inflation_radius per leg, and
# FollowPath.desired_linear_vel once both zones are found).
#
# THE FIVE SERVERS configured below and what each does:
#   planner_server      global path on the costmap — NavFn (Dijkstra wavefront)
#   controller_server   follows the path — Regulated Pure Pursuit + the 2 costmaps
#   behavior_server     recovery primitives (spin/backup/wait) the BT calls
#   bt_navigator        runs trees/nav2_minimal_tree.xml; exposes NavigateToPose
#   lifecycle_manager   configures+activates the above in order, supervises bonds
#
# DATA LINKS (hardware → result):
#   /scan_filtered (← scan_filter ← lidar) ─► both costmaps' obstacle_layer
#   /map + map→odom TF (← slam_toolbox)    ─► global_costmap static_layer + frame
#   odom_topic velocity (← base)           ─► controller odom smoother (RPP look-
#                                             ahead scaling reads the real speed)
#   shuttle_manager NavigateToPose goal    ─► bt_navigator ─► planner+controller
#   controller output                      ─► Twist on cmd_vel ─► base ─► wheels
#
# Differences from a "normal" Nav2 (minimal_nav2_params.yaml):
#   - No amcl   : slam_toolbox provides localisation via the map→odom TF.
#   - No map_server : slam_toolbox provides /map live.
#   - lifecycle_manager only manages planner, controller, bt_navigator (+behaviors).
# ════════════════════════════════════════════════════════════════════════════

planner_server:
  ros__parameters:
    expected_planner_frequency: 1.0
    use_sim_time: true
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

controller_server:
  ros__parameters:
    use_sim_time: true
    min_vel_x: 0.0
    min_speed_xy: 0.0
    min_theta_velocity: 1.0
    controller_frequency: 3.0    # 10→5→3: SBC misses 5 Hz too; 3 Hz gives each control cycle enough budget to hold rate
    controller_plugins: ["FollowPath"]
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      # TRUE: needed to react to DYNAMIC obstacles (e.g. a bottle dropped mid-run).
      # With it off the controller blindly follows the global path and only the
      # startup/SLAM-mapped obstacles get avoided.  ON, RPP checks the (now
      # trustworthy, since localization is offloaded/stable) local costmap along
      # its path and stops, then the global planner reroutes around the new
      # obstacle.  The earlier veto-thrash was from jumpy localization + a far
      # standoff sitting in wall inflation; neither holds now (markers aren't
      # lidar obstacles, so the 0.1 m approach stays clear).
      use_collision_detection: true
      # 2.0 s @ 0.25 m/s ≈ 0.5 m forward look (+ the 0.32 m footprint front) so it
      # STOPS well before a dynamic obstacle (a person stepping onto the path),
      # not ~0.3 m away which was too late.  Raise more only if it over-vetoes in
      # tight gaps.
      max_allowed_time_to_collision_up_to_carrot: 2.0
      # Slow for hardware bring-up; raise once the shuttle is reliable.
      desired_linear_vel: 0.22   # 0.25→0.22: smoother, more reaction margin
      lookahead_dist: 0.5          # 0.6→0.5: follow the path tighter (less corner-cutting into obstacles)
      use_velocity_scaled_lookahead_dist: true
      max_lookahead_dist: 1.0
      min_lookahead_dist: 0.25
      # MUST be true: the approach goal can be the robot's own position with a
      # facing yaw (when already within the standoff).  With this false the
      # controller cannot rotate in place to reach that yaw, so it never
      # satisfies the goal checker → times out forever → wanders.  Enabling it
      # lets RPP turn in place to the goal heading (and to face a box).
      use_rotate_to_heading: true
      # GENTLE rotation: this is a mecanum base whose odometry drifts badly during
      # fast in-place spins, and the (starved) scan-matcher can't correct it in
      # time — so a fast spin makes localization diverge from reality (the log
      # says "Reached A" while the robot actually spun off into a wall).  Slow
      # spins keep odom in step with scan-matching, like the gentle manual turns
      # that localized fine in the Step-2 test.
      rotate_to_heading_angular_vel: 0.4   # back to 0.4 (0.6 outran the scan-matcher — rotated map smears)
      rotate_to_heading_min_angle: 0.5
      max_angular_accel: 1.5
      use_cost_regulated_linear_velocity_scaling: true   # slow near obstacles
      regulated_linear_scaling_min_radius: 0.3
      regulated_linear_scaling_min_speed: 0.15
      approach_velocity_scaling_dist: 0.5
      max_accel_x: 1.5
      max_decel_x: 1.5

    progress_checker_plugins: ["progress_checker"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      # Lenient: the controller can't always hold its loop rate on this SBC (the
      # SLAM queue-full hogs the bus), so the robot moves in fits.  Require only
      # 5 cm of progress and allow 45 s before declaring "no progress", so a slow-
      # but-moving robot still completes the leg instead of aborting partway.
      required_movement_radius: 0.05
      movement_time_allowance: 45.0
    goal_checker_plugins: ["goal_checker"]
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      # Tight so the robot ends up squarely FACING the marker (camera is forward-
      # facing) for the precision team — _approach already sets the goal yaw to
      # point at the marker; this makes the controller actually achieve it.
      yaw_goal_tolerance: 0.12

local_costmap:
  local_costmap:
    ros__parameters:
      # 4 Hz: a moving obstacle (person) must be re-marked fast, or the robot
      # plans through where it was a second ago.  This is the reliable costmap for
      # dynamic obstacles (odom frame, no SLAM map->odom lag), so spend the CPU.
      update_frequency: 4.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: true
      # Real-robot SLAM publishes map->odom in bursts under CPU load, so a scan's
      # transform isn't always ready within the default 0.3 s -> the costmap's
      # message filter drops every scan ("timestamp earlier than all the data in
      # the transform cache") and Nav2 can't plan.  1.0 s tolerates the lag.
      transform_tolerance: 1.0
      rolling_window: true
      # 5x5 m (was 3x3): a 3 m window only saw obstacles within 1.5 m of the robot
      # centre — too late to react.  5 m sees a person ~2.5 m out so the controller
      # can stop / the planner can route while there's still room.
      width: 5
      height: 5
      resolution: 0.05
      # Footprint covers chassis + arm.  Front extent is 0.32 m (was 0.20) so the
      # box-holding arm pose (curled forward, used on the A→B legs) stays inside
      # the footprint and the controller's collision check accounts for it; ±0.25 m
      # lateral covers the arm at home.  Symmetric for both legs (over-reserving on
      # the B→A "arm up" leg is harmless).
      footprint: "[[0.32, 0.25], [0.32, -0.25], [-0.15, -0.25], [-0.15, 0.25]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan   # box_obstacles dropped: shuttle runs no box_perception
        scan:
          topic: /scan_filtered
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          # Must match scan_filter MIN_RANGE: the 0–0.25 m zone has no LIDAR
          # data (filtered out), so the raytrace must NOT clear cells there.
          # Without this, any obstacle within 0.25 m gets erased from the
          # costmap right as the robot reaches it.
          raytrace_min_range: 0.25
          obstacle_max_range: 2.5
          obstacle_min_range: 0.25
        # CLEAN box obstacles from box_perception (the short FLOOR boxes the
        # LIDAR can't see).  This is NOT the raw depth cloud — it only ever
        # contains points at confirmed boxes (floor/walls already excluded),
        # placed at obstacle_z, so it can't mark the ground.  Marking-only
        # (boxes are static); range generous since boxes are mapped in 'map'.
        box_obstacles:
          topic: /box_obstacles
          data_type: "PointCloud2"
          marking: true
          clearing: false
          min_obstacle_height: 0.05
          max_obstacle_height: 0.50
          obstacle_max_range: 10.0
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.5
        # = the footprint half-width (0.25 m): the global path stays clear of the
        # 0.50 m-wide robot, but no more than that, so it's MORE FORGIVING (was
        # 0.30) — it'll thread tighter gaps now that the box-carry footprint is
        # longer.  The controller's per-cycle footprint collision check (the full
        # 0.32 m-front polygon) is the real safety net, so a closer global path is
        # fine; the planner just needs to find a route.
        inflation_radius: 0.30   # 0.25→0.30: was clipping obstacles
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 2.0    # was 1.0 — re-mark + reroute around new obstacles sooner
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: true
      transform_tolerance: 1.0   # see local_costmap note
      footprint: "[[0.32, 0.25], [0.32, -0.25], [-0.15, -0.25], [-0.15, 0.25]]"
      resolution: 0.05
      # Large enough for any demo arena — oversize is safe; costs ~4 MB RAM.
      width: 100
      height: 100
      origin_x: -50.0
      origin_y: -50.0
      track_unknown_space: true
      # static_layer first so the SLAM map is the base; obstacle_layer adds
      # real-time sensor data on top; inflation_layer wraps both.
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        enabled: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan   # box_obstacles dropped: shuttle runs no box_perception
        scan:
          topic: /scan_filtered
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.25
          obstacle_max_range: 2.5
          obstacle_min_range: 0.25
        # CLEAN box obstacles from box_perception (see local_costmap note).
        box_obstacles:
          topic: /box_obstacles
          data_type: "PointCloud2"
          marking: true
          clearing: false
          min_obstacle_height: 0.05
          max_obstacle_height: 0.50
          obstacle_max_range: 10.0
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.5
        # = the footprint half-width (0.25 m): the global path stays clear of the
        # 0.50 m-wide robot, but no more than that, so it's MORE FORGIVING (was
        # 0.30) — it'll thread tighter gaps now that the box-carry footprint is
        # longer.  The controller's per-cycle footprint collision check (the full
        # 0.32 m-front polygon) is the real safety net, so a closer global path is
        # fine; the planner just needs to find a route.
        inflation_radius: 0.30   # 0.25→0.30: was clipping obstacles
      always_send_full_costmap: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2
    enable_stamped_cmd_vel: false

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 100
    default_server_timeout: 2000
    wait_for_service_timeout: 5000
    # BT XML path resolved portably by the launch file via FindPackageShare.
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
      enable_groot_monitoring: false
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
      enable_groot_monitoring: false
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_back_up_cancel_bt_node

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: true

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: true

lifecycle_manager:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names:
      - planner_server
      - controller_server
      - bt_navigator
